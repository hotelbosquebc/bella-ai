name: Manter API acordada

# Mantém a API do Render (plano grátis) desperta, evitando os ~50s de "cold start".
# Repositório público → minutos do GitHub Actions são gratuitos e ilimitados.
on:
  schedule:
    - cron: '*/10 * * * *' # a cada 10 minutos
  workflow_dispatch: {} # permite rodar manualmente pelo painel do GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping no health da API
        run: |
          echo "Acordando a API..."
          curl -fsS --max-time 120 https://bella-api-nh3h.onrender.com/api/health || echo "Ping falhou (a API pode estar acordando); tentaremos no próximo ciclo."
