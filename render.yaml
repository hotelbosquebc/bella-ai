# Blueprint do Render — publica a API gratuitamente (plano Free).
# No Render: New > Blueprint > conectar este repositório.
services:
  - type: web
    name: bella-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:generate -w apps/api && npm run build -w apps/api
    startCommand: cd apps/api && npx prisma migrate deploy && node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL # cole aqui a connection string do Neon
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEFAULT_HOTEL_ID
        value: hotel-do-bosque
      - key: BOOKING_ENGINE_BASE_URL
        value: https://reservas.hoteldobosque.com.br
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
