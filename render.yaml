# Blueprint do Render — publica a API + banco PostgreSQL da Bella (plano Free).
# No Render: New > Blueprint > conectar este repositório. O banco é criado e
# conectado automaticamente; as variáveis "sync: false" você preenche no painel.

databases:
  - name: bella-db
    plan: free
    databaseName: bella_ai
    user: bella
    region: virginia

services:
  - type: web
    name: bella-api
    runtime: node
    plan: free
    region: virginia
    buildCommand: npm install && npm run db:generate -w apps/api && npm run build -w apps/api
    # migrate (cria as tabelas) + seed idempotente (admin, hotel, políticas) + start
    startCommand: cd apps/api && npx prisma migrate deploy && node prisma/seed.js && node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL # conectado automaticamente ao banco bella-db acima
        fromDatabase:
          name: bella-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEFAULT_HOTEL_ID
        value: hotel-do-bosque
      - key: ADMIN_PASSWORD # senha do admin (defina no painel; o seed aplica a cada deploy)
        sync: false
      - key: BOOKING_ENGINE_BASE_URL
        value: https://sbreserva.silbeck.com.br/hotelbosque
      - key: BOOKING_ENGINE_PATH
        value: /pt-br/reserva
      # ===== Inteligência (Gemini gratuito) =====
      - key: AI_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY # mesma chave gratuita do Gemini já usada localmente
        sync: false
      # ===== Canais =====
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_PAGE_ACCESS_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
